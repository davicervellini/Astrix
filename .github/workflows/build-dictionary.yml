name: Build Dictionary JSON

on:
  push:
    branches:
      - main
    paths:
      - 'dictionary/**'
      - 'scripts/**'
  pull_request:
    branches:
      - main
    paths:
      - 'dictionary/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML
          
      - name: Build dictionary.json
        run: python scripts/build_dict.py
        
      - name: Commit changes
        # Só fará o commit se houver alterações no dictionary.json gerado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dictionary.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-build dictionary.json" && git push)
